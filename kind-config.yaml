kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
nodes:
  - role: control-plane
    extraPortMappings:
      # Orchestrator API
      - containerPort: 30080
        hostPort: 8000
        protocol: TCP
      # VNC ports for up to 10 concurrent task desktops
