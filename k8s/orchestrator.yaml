apiVersion: apps/v1
kind: Deployment
metadata:
  name: orchestrator
spec:
  replicas: 1
  selector:
    matchLabels:
      app: orchestrator
  template:
    metadata:
      labels:
        app: orchestrator
    spec:
      serviceAccountName: orchestrator-sa
      containers:
        - name: orchestrator
          image: orchestrator:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8000
          env:
            - name: TASK_RUNNER_IMAGE
              value: task-runner:latest
            - name: WEBTOP_IMAGE
              value: webtop:latest
            - name: ORCHESTRATOR_URL
              value: http://orchestrator.default.svc.cluster.local:8000
          volumeMounts:
            - name: data
              mountPath: /data
            - name: screenshots
              mountPath: /data/screenshots
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 3
            periodSeconds: 5
      volumes:
        - name: data
          emptyDir: {}
        - name: screenshots
          hostPath:
            path: /data/screenshots
            type: DirectoryOrCreate
---
apiVersion: v1
kind: Service
metadata:
  name: orchestrator
spec:
  type: NodePort
  selector:
    app: orchestrator
  ports:
    - port: 8000
      targetPort: 8000
      nodePort: 30080
